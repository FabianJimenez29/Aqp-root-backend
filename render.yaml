services:
  - type: web
    name: aqp-backend
    runtime: node
    region: ohio
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npx nest build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
